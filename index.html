<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧧 开工大吉 2026 🧧</title>
    <style>
        /* 原有样式保持不变... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            position: relative;
        }

        h1 {
            color: #e74c3c;
            font-size: 2.5em;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .date {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .lucky-btn {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .lucky-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.6);
        }

        .lucky-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        /* ⭐ 按钮禁用状态样式 */
        .lucky-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            background: linear-gradient(45deg, #999, #ccc);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            border-radius: 15px;
            min-height: 100px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-rain {
            position: fixed;
            top: -50px;
            font-size: 30px;
            animation: fall linear forwards;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .counter {
            font-size: 3em;
            color: #e74c3c;
            font-weight: bold;
            margin: 20px 0;
        }

        .wishes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .wish-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wish-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* Canvas 烟花层 */
        #fireworkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 动态弹窗样式 */
        .dynamic-popup {
            position: fixed;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            white-space: normal;
            max-width: 65vw;
            word-break: break-word;
            transform: translateX(-50%);
            left: 50%;
            animation: popupFloat 2.5s ease-out forwards;
        }

        @keyframes popupFloat {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(0);
            }
            10% {
                opacity: 1;
                transform: translateX(-50%) translateY(-8px);
            }
            90% {
                opacity: 1;
                transform: translateX(-50%) translateY(-20px);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
        }

        /* ⭐ 冷却提示样式 */
        .cooldown-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            z-index: 100;
            display: none;
            animation: fadeInOut 0.5s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* 好运加持标签 */
        .lucky-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ⭐ 倒计时显示 */
        .cooldown-timer {
            display: inline-block;
            margin-left: 8px;
            color: #ffd700;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 音乐元素 -->
    <audio id="backgroundMusic" preload="auto" loop>
        <source src="harmony.mp3" type="audio/mpeg">
        <!-- 如果浏览器不支持 MP3，可以添加其他格式 -->
    </audio>

    <canvas id="fireworkCanvas"></canvas>
    
    <div class="container">
        <h1>🧧 开工大吉 🧧</h1>
        <p class="date" id="currentDate"></p>
        
        <div class="counter" id="clickCount">0</div>
        <p>点击次数</p>
        
        <button class="lucky-btn" id="luckyBtn" onclick="getLucky()">🧧 抽开工运势</button>
        <button class="lucky-btn" id="fireworkBtn" onclick="fireworkShow()">🎆 放烟花庆祝</button>
        <button class="lucky-btn" id="grandBtn" onclick="grandFirework()">🎇 盛大烟花秀</button>
        
        <div class="result" id="result">
            <h3 id="resultTitle"></h3>
            <p id="resultText"></p>
            <div class="lucky-badge">🍀 好运加持 100%</div>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <div class="wishes">
            <div class="wish-card" onclick="addWish(this)">💰 财源滚滚</div>
            <div class="wish-card" onclick="addWish(this)">📈 事业腾飞</div>
            <div class="wish-card" onclick="addWish(this)">😊 天天开心</div>
            <div class="wish-card" onclick="addWish(this)">🎯 目标达成</div>
        </div>
    </div>

    <div class="cooldown-hint" id="cooldownHint">
        ⏳ 烟花冷却中<span class="cooldown-timer" id="cooldownTimer"></span>
    </div>

    <script>
        // ==================== 初始化 ====================
        const canvas = document.getElementById('fireworkCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 显示当前日期
        const date = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('currentDate').textContent = date.toLocaleDateString('zh-CN', options);

        let count = 0;
        
        // ==================== ⭐ 冷却控制系统 ====================
        let isCooldown = false;
        let cooldownEndTime = 0;
        
        // ⭐ 冷却时间配置（毫秒）
        const COOLDOWN_TIME = {
            grand: 5000,      // 盛大烟花秀 5 秒冷却
            firework: 400,    // 普通烟花 400ms 冷却
            click: 250        // 点击间隔 250ms
        };

        // ⭐ 粒子数量限制（防止卡死）
        const MAX_PARTICLES = 600;
        const MAX_ROCKETS = 15;

        // ⭐ 检查是否在冷却中
        function checkCooldown() {
            if (!isCooldown) return false;
            if (Date.now() >= cooldownEndTime) {
                isCooldown = false;
                return false;
            }
            return true;
        }

        // ⭐ 设置冷却并显示倒计时
        function setCooldown(duration, btnId) {
            isCooldown = true;
            cooldownEndTime = Date.now() + duration;
            
            const btn = document.getElementById(btnId);
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.dataset.originalText = originalText;
            btn.textContent = '⏳ 冷却中';
            
            const hint = document.getElementById('cooldownHint');
            const timer = document.getElementById('cooldownTimer');
            hint.style.display = 'block';
            
            // ⭐ 倒计时更新
            const timerInterval = setInterval(() => {
                const remaining = Math.ceil((cooldownEndTime - Date.now()) / 1000);
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    hint.style.display = 'none';
                    btn.disabled = false;
                    btn.textContent = btn.dataset.originalText;
                    isCooldown = false;
                } else {
                    timer.textContent = ` (${remaining}s)`;
                }
            }, 100);
        }

        // ==================== 好运文案 ====================
        const luckyMessages = [
            { title: "🌟 今日运势", text: "开工大吉！今天你的创造力爆棚，适合开启新项目！" },
            { title: "💰 财运指数", text: "财源广进！今年会有意外之财，记得请同事喝奶茶~" },
            { title: "📊 事业运", text: "步步高升！你的努力会被领导看见，升职加薪在望！" },
            { title: "❤️ 人际关系", text: "贵人相助！今天会遇到帮助你的人，多交流多沟通！" },
            { title: "🎯 目标达成", text: "心想事成！今年制定的目标有80%能实现，加油！" },
            { title: "😄 快乐指数", text: "笑口常开！保持好心情，好运自然来！" },
            { title: "🍀 幸运指数", text: "好运连连！今天做任何事都顺顺利利！" },
            { title: "💪 能量指数", text: "元气满满！今天精力充沛，工作效率翻倍！" },
            { title: "🎁 惊喜指数", text: "意外之喜！今天会有意想不到的好消息！" },
            { title: "🌈 综合运势", text: "万事顺意！2026年所有愿望都能实现！" }
        ];

        const popupMessages = [
            "💯 好运加持 100%",
            "🎉 开工大吉",
            "💰 财源滚滚",
            "📈 事业腾飞",
            "✨ 心想事成",
            "🍀 万事如意",
            "🎯 目标达成",
            "💪 元气满满",
            "🌟 星光璀璨",
            "🔥 红红火火"
        ];

        // ==================== 烟花颜色 ====================
        const fireworkColors = [
            ['#ff0066', '#ff3399', '#ff66cc', '#ff99ff'],
            ['#00ff66', '#33ff99', '#66ffcc', '#99ffff'],
            ['#0066ff', '#3399ff', '#66ccff', '#99eeff'],
            ['#ffcc00', '#ffdd44', '#ffee88', '#ffffcc'],
            ['#ff00cc', '#ff33dd', '#ff66ee', '#ff99ff'],
            ['#00ffcc', '#33ffdd', '#66ffee', '#99ffff'],
            ['#ff6600', '#ff8833', '#ffaa66', '#ffcc99'],
            ['#cc00ff', '#dd33ff', '#ee66ff', '#ff99ff']
        ];

        // ==================== 粒子类 ====================
        class Particle {
            constructor(x, y, color, type = 'normal') {
                this.x = x;
                this.y = y;
                this.color = color;
                this.type = type;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = type === 'spark' ? Math.random() * 3 + 1 : Math.random() * 5 + 2;
                
                this.velocity = {
                    x: Math.cos(angle) * speed,
                    y: Math.sin(angle) * speed
                };
                
                this.radius = type === 'spark' ? Math.random() * 1.5 + 0.5 : Math.random() * 2 + 1;
                this.alpha = 1;
                this.decay = type === 'spark' ? Math.random() * 0.02 + 0.01 : Math.random() * 0.015 + 0.008;
                this.gravity = 0.05;
                this.friction = 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
                this.draw();
                return this.alpha > 0;
            }
        }

        // ==================== 烟花火箭类 ====================
        class FireworkRocket {
            constructor(startX, startY, targetX, targetY, color) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = color;
                
                const dx = targetX - startX;
                const dy = targetY - startY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const speed = 12;
                
                this.velocity = {
                    x: (dx / distance) * speed,
                    y: (dy / distance) * speed
                };
                
                this.trail = [];
                this.trailLength = 10;
                this.exploded = false;
            }

            draw() {
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    const alpha = i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 2 * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.8})`;
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }

                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.velocity.y += 0.15;

                if (this.y <= this.targetY || this.velocity.y >= 0) {
                    this.exploded = true;
                }

                this.draw();
            }
        }

        // ==================== 粒子管理 ====================
        let particles = [];
        let rockets = [];

        function createExplosion(x, y, colorSet) {
            // ⭐ 检查粒子数量，避免过多
            const availableSlots = MAX_PARTICLES - particles.length;
            if (availableSlots <= 0) return;
            
            const particleCount = Math.min(50, Math.floor(availableSlots * 0.8));
            for (let i = 0; i < particleCount; i++) {
                const color = colorSet[Math.floor(Math.random() * colorSet.length)];
                particles.push(new Particle(x, y, color, 'normal'));
            }
            
            const sparkCount = Math.min(15, Math.floor(availableSlots * 0.3));
            for (let i = 0; i < sparkCount; i++) {
                particles.push(new Particle(x, y, '#ffffff', 'spark'));
            }
        }

        function createFirework(x, y) {
            // ⭐ 检查火箭数量
            if (rockets.length >= MAX_ROCKETS) return;
            
            const targetY = y || Math.random() * canvas.height * 0.4 + canvas.height * 0.1;
            const startX = x || Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
            const colorSet = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
            const color = colorSet[0];
            
            rockets.push(new FireworkRocket(startX, canvas.height, startX, targetY, color));
        }

        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            
            ctx.fillStyle = 'rgba(15, 12, 41, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = rockets.length - 1; i >= 0; i--) {
                rockets[i].update();
                if (rockets[i].exploded) {
                    const rocket = rockets[i];
                    const colorSet = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                    createExplosion(rocket.x, rocket.y, colorSet);
                    rockets.splice(i, 1);
                }
            }
            
            particles = particles.filter(p => p.update());
            
            // ⭐ 强制限制粒子数量
            if (particles.length > MAX_PARTICLES) {
                particles = particles.slice(0, MAX_PARTICLES);
            }
        }

        // ==================== 弹窗效果 ====================
        const popupPalettes = [
            { bg: 'rgba(255, 100, 200, 0.9)', color: '#fff', border: '#ff64c8' },
            { bg: 'rgba(100, 255, 200, 0.9)', color: '#000', border: '#64ffc8' },
            { bg: 'rgba(255, 200, 100, 0.9)', color: '#000', border: '#ffc864' },
            { bg: 'rgba(100, 150, 255, 0.9)', color: '#fff', border: '#6496ff' },
            { bg: 'rgba(200, 100, 255, 0.9)', color: '#fff', border: '#c864ff' }
        ];

        function createPopup(text, x, y) {
            const popup = document.createElement('div');
            popup.className = 'dynamic-popup';
            const palette = popupPalettes[Math.floor(Math.random() * popupPalettes.length)];
            
            Object.assign(popup.style, {
                backgroundColor: palette.bg,
                color: palette.color,
                border: `1.5px solid ${palette.border}`,
                boxShadow: `0 2px 6px rgba(0,0,0,0.2)`,
                fontSize: `${0.88 + Math.random() * 0.25}rem`,
                left: `${x}px`,
                top: `${y - 40}px`
            });

            popup.textContent = text;
            document.body.appendChild(popup);

            setTimeout(() => {
                if (popup.parentNode) popup.parentNode.removeChild(popup);
            }, 2500);
        }

        // ==================== 表情雨 ====================
        function createEmojiRain() {
            const emojis = ['🧧', '💰', '🎉', '🎊', '✨', '🌟', '💫', '🍊', '💯', '🔥'];
            
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-rain';
                    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = Math.random() * 100 + 'vw';
                    emoji.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(emoji);
                    
                    setTimeout(() => emoji.remove(), 4000);
                }, i * 200);
            }
        }

        // ==================== ⭐ 音乐系统 ====================
        // 1. 获取音乐元素
        const music = document.getElementById('backgroundMusic');

        // 2. 创建一个播放函数
        function playMusic() {
            // 尝试播放音乐
            music.play().catch(error => {
                console.warn("音乐播放被阻止，可能因用户未交互:", error);
                // 可以在这里添加提示，例如弹出一个“请点击按钮播放音乐”
            });
        }

        // 3. 为每个按钮添加音乐触发
        // 这里使用了一个小技巧：让三个按钮都调用同一个函数
        // 同时，为了防止重复播放，我们可以在播放后稍作延迟再允许再次播放
        // （但通常 `loop` 属性已经处理了自动重播）

        // ⭐ 重新定义 getLucky 函数
        function getLucky() {
            count++;
            document.getElementById('clickCount').textContent = count;
            
            const random = Math.floor(Math.random() * luckyMessages.length);
            const result = document.getElementById('result');
            const title = document.getElementById('resultTitle');
            const text = document.getElementById('resultText');
            
            title.textContent = luckyMessages[random].title;
            text.textContent = luckyMessages[random].text + " 好运加持100%！";
            result.style.display = 'block';
            
            const progress = document.getElementById('progress');
            progress.style.width = Math.min(count * 10, 100) + '%';
            
            createEmojiRain();
            createFirework();
            
            // ⭐ 播放音乐
            playMusic();

            // ⭐ 延迟一点，避免频繁触发（可选）
            // setTimeout(() => {}, 100);
        }

        // ⭐ 重新定义 fireworkShow 函数
        function fireworkShow() {
            if (checkCooldown()) return;
            
            count++;
            document.getElementById('clickCount').textContent = count;
            
            const colorSet = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
            const x = Math.random() * (canvas.width - 100) + 50;
            const y = Math.random() * (canvas.height * 0.5) + 50;
            
            createFirework(x, y);
            
            const progress = document.getElementById('progress');
            progress.style.width = Math.min(count * 10, 100) + '%';
            
            const msg = popupMessages[Math.floor(Math.random() * popupMessages.length)];
            createPopup(msg, x, y);
            
            createEmojiRain();
            
            // ⭐ 播放音乐
            playMusic();
            
            // ⭐ 设置冷却
            setCooldown(COOLDOWN_TIME.firework, 'fireworkBtn');
        }

        // ⭐ 重新定义 grandFirework 函数
        function grandFirework() {
            if (checkCooldown()) return;
            
            count += 5;
            document.getElementById('clickCount').textContent = count;
            
            const progress = document.getElementById('progress');
            progress.style.width = Math.min(count * 10, 100) + '%';

            // ⭐ 清空现有粒子，避免累积过多
            particles = [];
            rockets = [];

            // ⭐ 优化：减少轮数，增加间隔
            const texts = ['开工', '大吉', '2026', '加油', '💰', '🎉', '好运100%', '加持100%'];
            const totalRounds = 10;  // 从20减少到10
            const batchDelay = 500;  // 从250ms增加到500ms
            
            for (let i = 0; i < totalRounds; i++) {
                setTimeout(() => {
                    // ⭐ 检查粒子数量，避免过多
                    if (particles.length < MAX_PARTICLES * 0.7) {
                        const colorSet = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                        const x = Math.random() * (canvas.width - 100) + 50;
                        const y = Math.random() * (canvas.height * 0.5) + 50;
                        createFirework(x, y);
                        
                        if (i % 3 === 0) {
                            const text = texts[Math.floor(Math.random() * texts.length)];
                            createPopup(text, x, y);
                        }
                    }
                }, i * batchDelay);
            }

            // ⭐ 最后集中爆发 - 减少数量
            setTimeout(() => {
                for (let j = 0; j < 4; j++) {  // 从5减少到4
                    setTimeout(() => {
                        if (particles.length < MAX_PARTICLES * 0.8) {
                            const colorSet = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                            const x = canvas.width / 2 + (Math.random() - 0.5) * 300;
                            const y = canvas.height * 0.3 + (Math.random() - 0.5) * 100;
                            createFirework(x, y);
                        }
                    }, j * 400);  // 从300ms增加到400ms
                }
            }, totalRounds * batchDelay);

            createEmojiRain();
            
            const result = document.getElementById('result');
            const title = document.getElementById('resultTitle');
            const text = document.getElementById('resultText');
            title.textContent = "🎇 烟花盛典";
            text.textContent = "愿这绚烂的烟花照亮你2026年的每一天！事业如烟花般璀璨！";
            result.style.display = 'block';
            
            // ⭐ 播放音乐
            playMusic();
            
            // ⭐ 设置较长冷却时间
            setCooldown(COOLDOWN_TIME.grand, 'grandBtn');
        }

        // ⭐ addWish 函数也加入音乐
        function addWish(card) {
            card.style.background = 'linear-gradient(45deg, #f093fb, #f5576c)';
            card.style.color = 'white';
            
            const result = document.getElementById('result');
            const title = document.getElementById('resultTitle');
            const text = document.getElementById('resultText');
            
            title.textContent = "✅ 愿望已收藏";
            text.textContent = card.textContent + " - 2026年一定能实现！";
            result.style.display = 'block';
            
            createEmojiRain();
            createFirework();
            
            // ⭐ 播放音乐
            playMusic();
        }

        // ==================== ⭐ 点击交互（带限流） ====================
        let lastClickTime = 0;

        canvas.addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastClickTime < COOLDOWN_TIME.click) return;
            lastClickTime = now;
            
            if (particles.length < MAX_PARTICLES * 0.9) {
                createFirework(e.clientX, e.clientY);
                
                if (Math.random() > 0.5) {
                    const msg = popupMessages[Math.floor(Math.random() * popupMessages.length)];
                    createPopup(msg, e.clientX, e.clientY);
                }
                
                // ⭐ 在画布点击时也播放音乐
                playMusic();
            }
        });

        // ==================== ⭐ 初始化 ====================
        animate();
        
        // ⭐ 页面加载完成后，尝试自动播放音乐（可选，但需用户交互）
        // 由于现代浏览器策略，必须由用户操作触发，所以这里不自动播放
        // 可以在第一个按钮点击时播放

        setTimeout(() => {
            createFirework();
        }, 500);
    </script>
</body>

</html>
